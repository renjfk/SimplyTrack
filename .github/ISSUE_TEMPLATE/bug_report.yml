name: Bug Report
description: "Report a bug or unexpected behavior. For setup help or questions, please start a Discussion first."
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. 15.4"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Visible in Settings or the About window.
      placeholder: "e.g. 1.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser involved
      description: If the bug is related to website tracking, which browser were you using?
      multiple: true
      options:
        - Not applicable
        - Safari
        - Chrome
        - Edge
        - Arc

    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
