name: Prerelease

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (leave empty for branch-only prerelease)"
        required: false
      comment_id:
        description: "Comment ID for reply (set by slash-command dispatcher)"
        required: false

permissions:
  contents: write
  pull-requests: write

env:
  XCODE_VERSION: latest-stable
  NODE_VERSION: "18"

jobs:
  resolve:
    name: Resolve context
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      release_tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Resolve
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"

          if [ -n "$PR_NUMBER" ]; then
            PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid,headRefName)
            HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
            HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
          else
            HEAD_SHA="$GITHUB_SHA"
            HEAD_REF="$GITHUB_REF_NAME"
          fi

          LATEST_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" \
            --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty')
          BASE="${LATEST_TAG:-v0.0}"
          BASE="${BASE#v}"
          SHORT_SHA="${HEAD_SHA:0:7}"

          if [ -n "$PR_NUMBER" ]; then
            TAG="v${BASE}-pr${PR_NUMBER}.${SHORT_SHA}"
          else
            SAFE_REF=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
            TAG="v${BASE}-${SAFE_REF}.${SHORT_SHA}"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Prerelease: $TAG ($HEAD_REF @ $SHORT_SHA)"

  prerelease:
    name: Build and Prerelease
    runs-on: macos-latest
    needs: resolve

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.resolve.outputs.release_tag }}" -m "Prerelease ${{ needs.resolve.outputs.release_tag }}"
          git push origin "${{ needs.resolve.outputs.release_tag }}"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Update version in project
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          BUILD_NUMBER="$GITHUB_RUN_NUMBER"

          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $VERSION/g" SimplyTrack.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" SimplyTrack.xcodeproj/project.pbxproj

      - name: Import signing certificate
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
        run: |
          echo "$MACOS_SIGN_P12" | base64 --decode > certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certificate.p12 -P "$MACOS_SIGN_PASSWORD" -k build.keychain -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          rm certificate.p12

      - name: Extract certificate info
        id: get_cert
        run: |
          CERT_LINE=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1)
          CERT_IDENTITY=$(echo "$CERT_LINE" | sed 's/.*"\(.*\)".*/\1/')
          TEAM_ID=$(echo "$CERT_IDENTITY" | sed 's/.*(\([A-Z0-9]*\)).*/\1/')

          echo "cert-identity=$CERT_IDENTITY" >> $GITHUB_OUTPUT
          echo "team-id=$TEAM_ID" >> $GITHUB_OUTPUT

      - name: Build and Archive
        timeout-minutes: 10
        run: |
          CERT_IDENTITY="${{ steps.get_cert.outputs.cert-identity }}"
          TEAM_ID="${{ steps.get_cert.outputs.team-id }}"

          xcodebuild -project SimplyTrack.xcodeproj \
            -scheme SimplyTrack \
            -configuration Release \
            -archivePath build/SimplyTrack.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CERT_IDENTITY" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

      - name: Export signed app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SimplyTrack.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist exportOptions.plist

      - name: Locate app bundle
        id: locate_app
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in build directory"
            exit 1
          fi
          echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Setup notarization credentials
        env:
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
        run: |
          mkdir -p ~/private_keys

          if echo "$MACOS_NOTARY_KEY" | base64 -d > /tmp/test_key 2>/dev/null; then
            echo "$MACOS_NOTARY_KEY" | base64 -d > ~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8
          else
            echo "$MACOS_NOTARY_KEY" > ~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8
          fi

          chmod 600 ~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8

          openssl pkey -in ~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8 -text -noout || {
            echo "$MACOS_NOTARY_KEY" | tr -d '\r' | sed 's/\\n/\n/g' > ~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8
            chmod 600 ~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8
          }

          PROFILE_NAME="notary-profile-$GITHUB_RUN_ID"
          echo "NOTARY_PROFILE=$PROFILE_NAME" >> $GITHUB_ENV

          xcrun notarytool store-credentials "$PROFILE_NAME" \
            --key "~/private_keys/AuthKey_$MACOS_NOTARY_KEY_ID.p8" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID"

      - name: Setup Node.js for appdmg
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Create, notarize and staple DMG
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          APP_PATH="${{ steps.locate_app.outputs.app-path }}"
          CERT_IDENTITY="${{ steps.get_cert.outputs.cert-identity }}"

          sed "s|{{TITLE}}|SimplyTrack v$VERSION|g; s|{{APP_PATH}}|$APP_PATH|g; s|{{CERT_IDENTITY}}|$CERT_IDENTITY|g" appdmg.template.json > appdmg_temp.json

          appdmg appdmg_temp.json "SimplyTrack-$VERSION.dmg"
          rm appdmg_temp.json

          xcrun notarytool submit "SimplyTrack-$VERSION.dmg" \
            --keychain-profile "$NOTARY_PROFILE" \
            --wait

          xcrun stapler staple "SimplyTrack-$VERSION.dmg"

          mv "SimplyTrack-$VERSION.dmg" "SimplyTrack.dmg"
          shasum -a 256 "SimplyTrack.dmg" > "SimplyTrack.dmg.sha256"

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          REF="${{ needs.resolve.outputs.head_ref }}"
          SHA="${{ needs.resolve.outputs.head_sha }}"
          PR="${{ needs.resolve.outputs.pr_number }}"

          NOTES="Pre-release build from branch \`$REF\` (commit \`$SHA\`)."
          [ -n "$PR" ] && NOTES="Pre-release build from PR #$PR (branch \`$REF\`, commit \`$SHA\`)."

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Prerelease $TAG" \
            --notes "$NOTES" \
            --prerelease \
            SimplyTrack.dmg SimplyTrack.dmg.sha256

      - name: Comment on PR
        if: needs.resolve.outputs.pr_number != '' && inputs.comment_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          gh pr comment "${{ needs.resolve.outputs.pr_number }}" --repo "$GITHUB_REPOSITORY" \
            --body "Prerelease [\`$TAG\`](https://github.com/${{ github.repository }}/releases/tag/$TAG) is ready."

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/private_keys || true
          security delete-keychain build.keychain || true
